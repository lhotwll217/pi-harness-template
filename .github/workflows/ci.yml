name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS first: the sandbox adapter targets Seatbelt here; its probe skips
    # loudly on runners where enforcement cannot run, and every other tier is
    # environment-independent.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
